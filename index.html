<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alessandria | MONUMENTALIA!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --border: #2e2e2e;
    --cream: #f0f0f0;
    --muted: #888888;

    --p1168: #7aaee0;
    --p1501: #9e8ecc;
    --p1701: #6ec4a8;
    --p1801: #f0a070;
    --p1901: #c4a86c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #f0f0f0;
    font-family: 'Titillium Web', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 64px;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }

  .brand {
    display: flex;
    flex-direction: row;
    align-items: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .brand > div {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-city {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: #aaaaaa;
    text-transform: uppercase;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .brand-tagline {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-top: 1px;
    line-height: 1;
  }
  .brand-icon {
    font-family: 'Material Symbols Rounded';
    font-size: 32px;
    color: var(--cream);
    margin-right: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 5px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0;
    align-items: center;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Titillium Web', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn.active {
    border-color: currentColor;
    color: var(--cream);
    background: rgba(255,255,255,0.05);
  }
  .filter-btn:hover { opacity: 0.85; }
  .filter-btn.all { color: #cccccc; }
  .filter-btn.all.active { border-color: #cccccc; background: rgba(255,255,255,0.06); }

  .count-badge {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 400;
  }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* MAP */
  #map {
    flex: 1;
    background: #1a1812;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 1200;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }

  .sidebar-toggle-desktop {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 1300;
    height: 32px;
    padding: 0 12px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(28,28,28,0.92);
    color: var(--cream);
    font-family: 'Titillium Web', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .sidebar-hover-zone {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 10px;
    z-index: 1240;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .sidebar-tab {
    width: 18px;
    height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    color: var(--muted);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
    appearance: none;
    -webkit-appearance: none;
  }
  .sidebar-tab:hover { color: var(--cream); background: #262626; }

  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #aaaaaa;
    text-transform: uppercase;
    font-weight: 300;
  }
  .sidebar-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .place-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .place-list::-webkit-scrollbar { width: 3px; }
  .place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .place-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(46,42,34,0.5);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .place-item:hover { background: rgba(255,255,255,0.04); }
  .place-item.highlighted { background: rgba(255,255,255,0.06); }

  .place-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .place-name {
    font-size: 12px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
    flex: 1;
  }
  .place-cat {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper,
  .leaflet-popup-content,
  .leaflet-popup-content * {
    font-family: 'Titillium Web', sans-serif !important;
  }
  .leaflet-popup-content-wrapper {
    background: #ffffff !important;
    border: 1px solid #e0e0e0 !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
    min-width: 260px;
  }
  .leaflet-popup-tip { background: #ffffff !important; }
  .leaflet-popup-close-button { color: #888888 !important; top: 8px !important; right: 10px !important; font-size: 16px !important; }

  .popup-inner {
    padding: 14px 18px 14px;
  }
  .popup-period {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .popup-name {
    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.25;
    margin-bottom: 10px;
    padding-right: 16px;
  }
  .popup-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 10px;
    display: block;
  }
  .popup-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border-bottom: 1px solid #e0e0e0;
  }
  .popup-tab {
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaaaaa;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: 'Titillium Web', sans-serif;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-weight: 300;
  }
  .popup-tab.active {
    color: #1a1a1a;
    border-bottom-color: #1a1a1a;
  }
  .popup-desc {
    font-size: 12px;
    color: #444444;
    line-height: 1.6;
    max-height: 180px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .popup-desc::-webkit-scrollbar { width: 3px; }
  .popup-desc::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 2px; }
  .popup-desc-empty {
    font-size: 11px;
    color: #aaaaaa;
    font-style: italic;
  }

  .leaflet-div-icon { background: none !important; border: none !important; box-shadow: none !important; }
  .leaflet-marker-shadow { display: none !important; }
  .leaflet-tile { filter: brightness(1) saturate(0.85); }

  /* FOOTER */
  footer {
    height: 26px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 16px;
    flex-shrink: 0;
  }
  footer span {
    display: block;
    font-size: 10px;
    line-height: 1;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  footer span em { color: #cccccc; font-style: normal; }

  /* MOBILE SIDEBAR TOGGLE */
  .sidebar-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 2000;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--cream);
    font-size: 20px;
    line-height: 48px;
    text-align: center;
    cursor: pointer;
    padding: 0;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  @media (max-width: 768px) {
    header {
      height: auto;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 12px 6px;
      gap: 8px;
    }
    .brand-name { font-size: 16px; }
    .brand-tagline { font-size: 8px; display: block; line-height: 1; }
    .filters { width: 100%; gap: 5px; padding: 2px 0 2px; }
    .filter-btn { font-size: 10px; padding: 5px 9px; gap: 4px; }
    .count-badge { display: none; }
    .sidebar {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 80vw;
      max-width: 320px;
      z-index: 1500;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      border-left: 1px solid var(--border);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1400; }
    .sidebar-overlay.open { display: block; }
    .sidebar-toggle { display: flex; }
    footer { display: none; }
    .sidebar-toggle-desktop, .sidebar-hover-zone { display: none; }
  }
</style>
</head>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<button class="sidebar-toggle" id="sidebar-toggle" style="-webkit-appearance:none;cursor:pointer;" aria-expanded="false" aria-controls="desktop-sidebar" aria-label="Apri elenco monumenti">&#9776;</button>

<header>
  <div class="brand">
    <span class="brand-icon material-symbols-rounded">account_balance</span>

      <span class="brand-city">Alessandria</span>

      <span class="dot" style="background:var(--p1901)"></span>

  </div>
</header>

<div class="main">
  <div id="map"></div>
  <button class="sidebar-toggle-desktop" id="sidebar-toggle-desktop" type="button" aria-expanded="false" aria-controls="desktop-sidebar">Sidebar</button>
  <div class="sidebar-hover-zone" id="sidebar-hover-zone">

  <div class="sidebar" id="desktop-sidebar">

      <div class="sidebar-count" id="sidebar-count">— monumenti</div>
    </div>
    <div class="place-list" id="place-list"></div>
  </div>
</div>

<footer>
  <span>© 2026 &nbsp;·&nbsp; <em>MONUMENTALIA!</em> &nbsp;·&nbsp; bergolium1071</span>
</footer>

const PERIOD_COLORS = {
  "1168 - 1500": "#7aaee0",
  "1501 - 1700": "#9e8ecc",
  "1701 - 1800": "#6ec4a8",
  "1801 - 1900": "#f0a070",
  "1901 - 2000": "#c4a86c",
};

const PERIOD_LABELS = {
  "1168 - 1500": "1168 – 1500",
  "1501 - 1700": "1501 – 1700",
  "1701 - 1800": "1701 – 1800",
  "1801 - 1900": "1801 – 1900",
  "1901 - 2000": "1901 – 2026",
};

function escapeHtml(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escapeAttr(v) { return escapeHtml(v); }

// Map
const map = L.map('map', { center: [44.913, 8.616], zoom: 15, zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'topleft' }).addTo(map);

// Layer groups
const layerGroups = {};
Object.keys(PERIOD_COLORS).forEach(p => layerGroups[p] = L.layerGroup().addTo(map));

// Polygons
const polygons = [];
MONUMENTS.forEach((m, i) => {
  const color = PERIOD_COLORS[m.period] || '#cccccc';
  // For polygons with holes, coords is [[outer],[hole1],...]; otherwise flat array
  const leafletCoords = m.hasHoles ? m.coords : m.coords;
  const poly = L.polygon(leafletCoords, {
    color: color,
    fillColor: color,
    fillOpacity: 0.35,
    weight: 1.5,
    opacity: 0.9,
  });

  poly.on('click', () => {
    highlightItem(i);
    openPopup(poly, m);
  });
  poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.6, weight: 2.5 }); });
  poly.on('mouseout', function() { this.setStyle({ fillOpacity: 0.35, weight: 1.5 }); });

  layerGroups[m.period].addLayer(poly);
  polygons.push({ poly, data: m, index: i });
});

// Popup
let currentLang = {};

function openPopup(poly, m) {
  const color = PERIOD_COLORS[m.period] || '#cccccc';
  const safeColor = escapeAttr(color);
  const safeName = escapeHtml(m.name);
  const periodLabel = escapeHtml(PERIOD_LABELS[m.period] || m.period);

  const photoHtml = m.photo
    ? `<img class="popup-photo" src="${escapeAttr(m.photo)}" alt="${safeName}" onerror="this.style.display='none'">`
    : '';

  const hasIt = !!m.descIt;
  const hasEn = !!m.descEn;
  const hasDesc = hasIt || hasEn;
  const popupId = `popup-${m.name.replace(/[^a-zA-Z0-9]/g,'_')}`;

  let tabsHtml = '';
  let descHtml = '';
  if (hasDesc) {
    tabsHtml = `<div class="popup-tabs">
      <button class="popup-tab${hasIt ? ' active' : ''}" onclick="switchLang('${popupId}','it',this)">Italiano</button>
      <button class="popup-tab${!hasIt && hasEn ? ' active' : ''}" onclick="switchLang('${popupId}','en',this)">English</button>
    </div>`;
    const startText = hasIt ? m.descIt : m.descEn;
    descHtml = `<div class="popup-desc" id="${popupId}-desc">${escapeHtml(startText)}</div>`;
  } else {
    descHtml = `<div class="popup-desc popup-desc-empty">Descrizione in arrivo.</div>`;
  }

  const html = `<div class="popup-inner">
    <div class="popup-period" style="color:${safeColor}">${periodLabel}</div>
    <div class="popup-name">${safeName}</div>
    ${photoHtml}
    ${tabsHtml}
    ${descHtml}
  </div>`;

  // Store desc for lang switch
  currentLang[popupId] = { it: m.descIt, en: m.descEn };

  const bounds = poly.getBounds();
  const center = bounds.getCenter();
  L.popup({ maxWidth: 360, className: '' })
    .setLatLng(center)
    .setContent(html)
    .openOn(map);
}

window.switchLang = function(popupId, lang, btn) {
  const desc = currentLang[popupId];
  if (!desc) return;
  const el = document.getElementById(`${popupId}-desc`);
  if (!el) return;
  const text = lang === 'it' ? desc.it : desc.en;
  el.textContent = text || 'Testo non disponibile.';
  document.querySelectorAll('.popup-tabs .popup-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

// Sidebar
function buildList(filter) {
  const list = document.getElementById('place-list');
  list.innerHTML = '';
  let filtered;
  if (filter === 'none') filtered = [];
  else if (filter === 'all') filtered = MONUMENTS;
  else if (filter === 'multi') filtered = MONUMENTS.filter(m => activeFilters.has(m.period));
  else filtered = MONUMENTS.filter(m => m.period === filter);

  document.getElementById('sidebar-count').textContent = `${filtered.length} monument${filtered.length !== 1 ? 'i' : 'o'}`;

  filtered.forEach(m => {
    const color = PERIOD_COLORS[m.period] || '#cccccc';
    const item = document.createElement('div');
    item.className = 'place-item';
    const realIndex = MONUMENTS.indexOf(m);
    item.id = `item-${realIndex}`;

    const dot = document.createElement('div');
    dot.className = 'place-dot';
    dot.style.background = color;

    const wrap = document.createElement('div');
    wrap.style.flex = '1';

    const name = document.createElement('div');
    name.className = 'place-name';
    name.textContent = m.name;
    wrap.appendChild(name);

    if (activeFilters.size !== 1) {
      const cat = document.createElement('div');
      cat.className = 'place-cat';
      cat.textContent = PERIOD_LABELS[m.period] || m.period;
      wrap.appendChild(cat);
    }

    item.appendChild(dot);
    item.appendChild(wrap);

    item.addEventListener('click', () => {
      highlightItem(realIndex);
      const bounds = polygons[realIndex].poly.getBounds();
      const center = bounds.getCenter();
      const target = [center.lat - 0.0008, center.lng];
      map.once('moveend', () => openPopup(polygons[realIndex].poly, MONUMENTS[realIndex]));
      map.flyTo(target, 18, { animate: true, duration: 0.6 });

      const desktopSidebar = document.getElementById('desktop-sidebar');
      const mobileSidebarToggle = document.getElementById('sidebar-toggle');
      const sidebarOverlay = document.getElementById('sidebar-overlay');
      const isPinned = desktopSidebar?.dataset.pinned === 'true';
      if (window.innerWidth <= 768) {
        desktopSidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
        mobileSidebarToggle.innerHTML = '&#9776;';
        mobileSidebarToggle.setAttribute('aria-expanded', 'false');
        return;
      }
      if (!isPinned) desktopSidebar.classList.remove('open');
    });

    list.appendChild(item);
  });
}

function highlightItem(globalIndex) {
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('highlighted'));
  const el = document.getElementById(`item-${globalIndex}`);
  if (el) { el.classList.add('highlighted'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
}

// Counts
const counts = {};
Object.keys(PERIOD_COLORS).forEach(p => counts[p] = 0);
MONUMENTS.forEach(m => { if (counts[m.period] !== undefined) counts[m.period]++; });
document.getElementById('cnt-all').textContent = MONUMENTS.length;
document.getElementById('cnt-1168').textContent = counts['1168 - 1500'] || 0;
document.getElementById('cnt-1501').textContent = counts['1501 - 1700'] || 0;
document.getElementById('cnt-1701').textContent = counts['1701 - 1800'] || 0;
document.getElementById('cnt-1801').textContent = counts['1801 - 1900'] || 0;
document.getElementById('cnt-1901').textContent = counts['1901 - 2000'] || 0;

// Filter logic
const activeFilters = new Set(Object.keys(PERIOD_COLORS));

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => filterPeriod(btn.dataset.period, btn));
});

function syncAllBtn() {
  const allBtn = document.querySelector('.filter-btn.all');
  allBtn.classList.toggle('active', activeFilters.size === Object.keys(PERIOD_COLORS).length);
}

function rebuildSidebar() {
  if (activeFilters.size === 0) buildList('none');
  else if (activeFilters.size === Object.keys(PERIOD_COLORS).length) buildList('all');
  else if (activeFilters.size === 1) buildList([...activeFilters][0]);
  else buildList('multi');
}

function filterPeriod(period, btn) {
  if (period === 'all') {
    const allActive = activeFilters.size === Object.keys(PERIOD_COLORS).length;
    if (allActive) {
      activeFilters.clear();
      Object.keys(PERIOD_COLORS).forEach(p => layerGroups[p].remove());
      document.querySelectorAll('.filter-btn:not(.all)').forEach(b => b.classList.remove('active'));
      btn.classList.remove('active');
    } else {
      Object.keys(PERIOD_COLORS).forEach(p => { activeFilters.add(p); layerGroups[p].addTo(map); });
      document.querySelectorAll('.filter-btn:not(.all)').forEach(b => b.classList.add('active'));
      btn.classList.add('active');
    }
  } else {
    if (activeFilters.has(period)) {
      activeFilters.delete(period);
      layerGroups[period].remove();
      btn.classList.remove('active');
    } else {
      activeFilters.add(period);
      layerGroups[period].addTo(map);
      btn.classList.add('active');
    }
    syncAllBtn();
  }
  rebuildSidebar();
}

document.addEventListener('DOMContentLoaded', () => {
  syncAllBtn();
  rebuildSidebar();
});
</script>

<script>
// Sidebar toggle logic
(() => {
  const desktopSidebar = document.getElementById('desktop-sidebar');
  const desktopHoverZone = document.getElementById('sidebar-hover-zone');
  const desktopSidebarToggle = document.getElementById('sidebar-toggle-desktop');
  const desktopSidebarTab = document.getElementById('sidebar-tab-desktop');
  const mobileSidebarToggle = document.getElementById('sidebar-toggle');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  let desktopSidebarPinned = false;
  desktopSidebar.dataset.pinned = 'false';

  function openDesktopSidebar() {
    if (window.innerWidth <= 768 || desktopSidebarPinned) return;
    desktopSidebar.classList.add('open');
  }
  function closeDesktopSidebar() {
    if (window.innerWidth <= 768 || desktopSidebarPinned) return;
    desktopSidebar.classList.remove('open');
  }
  function toggleDesktopSidebar() {
    if (window.innerWidth <= 768) return;
    const isOpen = desktopSidebar.classList.contains('open');
    if (isOpen && desktopSidebarPinned) {
      desktopSidebarPinned = false;
      desktopSidebar.dataset.pinned = 'false';
      desktopSidebar.classList.remove('open');
      desktopSidebarToggle.setAttribute('aria-expanded', 'false');
    } else {
      desktopSidebarPinned = true;
      desktopSidebar.dataset.pinned = 'true';
      desktopSidebar.classList.add('open');
      desktopSidebarToggle.setAttribute('aria-expanded', 'true');
    }
  }
  function toggleSidebar() {
    const isOpen = desktopSidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
    mobileSidebarToggle.innerHTML = isOpen ? '&times;' : '&#9776;';
    mobileSidebarToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    mobileSidebarToggle.setAttribute('aria-label', isOpen ? 'Chiudi elenco monumenti' : 'Apri elenco monumenti');
  }
  function closeSidebar() {
    desktopSidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
    mobileSidebarToggle.innerHTML = '&#9776;';
    mobileSidebarToggle.setAttribute('aria-expanded', 'false');
    mobileSidebarToggle.setAttribute('aria-label', 'Apri elenco monumenti');
  }

  desktopHoverZone.addEventListener('mouseenter', openDesktopSidebar);
  desktopSidebar.addEventListener('mouseleave', closeDesktopSidebar);
  desktopSidebarToggle.addEventListener('click', toggleDesktopSidebar);
  desktopSidebarTab.addEventListener('click', openDesktopSidebar);
  mobileSidebarToggle.addEventListener('click', toggleSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  window.addEventListener('resize', () => {
    if (window.innerWidth <= 768) {
      desktopSidebarPinned = false;
      desktopSidebar.dataset.pinned = 'false';
      desktopSidebar.classList.remove('open');
      desktopSidebarToggle.setAttribute('aria-expanded', 'false');
    } else {
      sidebarOverlay.classList.remove('open');
      mobileSidebarToggle.innerHTML = '&#9776;';
      mobileSidebarToggle.setAttribute('aria-expanded', 'false');
      desktopSidebar.classList.remove('open');
      desktopSidebarPinned = false;
      desktopSidebar.dataset.pinned = 'false';
      desktopSidebarToggle.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
</body>
